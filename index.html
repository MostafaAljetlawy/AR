<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>
  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false">
    
    <!-- إضافة إضاءة للمشهد لتظهر المجسمات بشكل واقعي -->
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 1 1" intensity="0.5"></a-light>

    <a-assets>
      <a-asset-item id="robot1" src="./object/robot1.glb"></a-asset-item>
      <a-asset-item id="robot2" src="./object/robot2.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- المجسم الأول للـ QR الأول (Index 0) -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model src="#robot1" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>
    
    <!-- المجسم الثاني للـ QR الثاني (Index 1) -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model src="#robot2" position="0 0 0" scale="0.5 0.5 0.5"></a-gltf-model>
    </a-entity>
    
  </a-scene>
</body>
</html>
