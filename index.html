<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  
  <style>
    #scanning-overlay {
      display: flex;
      align-items: center;
      justify-content: center;
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      bottom: 0;
      background: rgba(0,0,0,0.5);
      color: white;
      text-align: center;
      z-index: 1000;
    }
  </style>
</head>
<body>
  
  <!-- واجهة التوجيه -->
  <div id="scanning-overlay">
    <div style="padding: 20px; border: 2px solid white; border-radius: 10px;">
      وجه الكاميرا نحو البطاقة لرؤية الروبوت
    </div>
  </div>

  <a-scene 
    mindar-image="imageTargetSrc: ./targets.mind; autoStart: true; uiScanning: #scanning-overlay;" 
    color-space="sRGB" 
    renderer="colorManagement: true, physicallyCorrectLights"
    vr-mode-ui="enabled: false"
    device-orientation-permission-ui="enabled: false"
    cursor="rayOrigin: mouse"
    raycaster="objects: .clickable">
    
    <a-light type="ambient" intensity="1"></a-light>
    <a-light type="directional" position="1 1 1" intensity="0.5"></a-light>

    <a-assets>
      <a-asset-item id="robot1" src="./object/robot1.glb"></a-asset-item>
      <a-asset-item id="robot2" src="./object/robot2.glb"></a-asset-item>
    </a-assets>

    <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

    <!-- المجسم الأول مع تدوير تلقائي وتفاعل باللمس -->
    <a-entity mindar-image-target="targetIndex: 0">
      <a-gltf-model class="clickable" src="#robot1" position="0 0 0" scale="0.5 0.5 0.5"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear;"
                    onclick="this.setAttribute('animation__click', 'property: scale; to: 0.7 0.7 0.7; dur: 200; dir: alternate; loop: 2')">
      </a-gltf-model>
    </a-entity>
    
    <!-- المجسم الثاني مع تدوير تلقائي وتفاعل باللمس -->
    <a-entity mindar-image-target="targetIndex: 1">
      <a-gltf-model class="clickable" src="#robot2" position="0 0 0" scale="0.5 0.5 0.5"
                    animation="property: rotation; to: 0 360 0; loop: true; dur: 8000; easing: linear;"
                    onclick="this.setAttribute('animation__click', 'property: rotation; to: 0 360 360; dur: 500;')">
      </a-gltf-model>
    </a-entity>
    
  </a-scene>
</body>
</html>
